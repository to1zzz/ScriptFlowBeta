<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ScriptFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">SF</div>
    <button onclick="goHome()">🏠</button>
    <button onclick="addScene()">📄</button>
    <button onclick="addFolder()">📁</button>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <span id="projectName">No Project</span>
    </div>

    <div class="workspace">

      <!-- Explorer -->
      <div class="explorer">
        <div class="explorer-title">EXPLORER</div>
        <div id="scenes"></div>
      </div>

      <!-- Editor -->
      <div class="editor-container">
        <div id="editor" contenteditable="true"></div>
      </div>

    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
