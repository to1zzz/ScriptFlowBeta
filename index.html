<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ScriptFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- HOME -->
<div id="home" class="screen">
  <div class="header">ScriptFlow</div>

  <div id="projects" class="grid"></div>

  <button class="main-btn" onclick="createProject()">+ New Project</button>
</div>

<!-- PROJECT -->
<div id="projectScreen" class="screen hidden">
  <div class="header">
    <button onclick="goHome()">←</button>
    <span id="projectTitle"></span>
  </div>

  <div id="workspaces" class="grid"></div>

  <button class="main-btn" onclick="createWorkspace()">+ New Workspace</button>
</div>

<!-- WORKSPACE -->
<div id="workspaceScreen" class="hidden">

  <div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
      <button onclick="goProject()">←</button>
      <button onclick="addScene()">📄</button>
    </div>

    <!-- Main -->
    <div class="main">

      <div class="topbar" id="workspaceTitle"></div>

      <div class="workspace-body">

        <div class="explorer" id="scenes"></div>

        <div class="editor">
          <div id="editor" contenteditable="true"></div>
        </div>

      </div>

    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
